<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sparkleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCA5A5;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- Main Prompt Symbol (Chat Bubble with Sparkle) -->
  <g filter="url(#glow)">
    <!-- Chat Bubble -->
    <path d="M140 160C140 137.909 157.909 120 180 120H332C354.091 120 372 137.909 372 160V280C372 302.091 354.091 320 332 320H240L180 370V320C157.909 320 140 302.091 140 280V160Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Inner Glow -->
    <path d="M155 160C155 146.193 166.193 135 180 135H332C345.807 135 357 146.193 357 160V280C357 293.807 345.807 305 332 305H250L195 345V305C181.193 305 170 293.807 170 280V160H155Z" 
          fill="url(#bgGradient)" opacity="0.1"/>
    
    <!-- Sparkle Lines -->
    <g opacity="0.9">
      <!-- Top Sparkle -->
      <circle cx="256" cy="180" r="8" fill="#FCD34D"/>
      <line x1="256" y1="155" x2="256" y2="165" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
      <line x1="256" y1="195" x2="256" y2="205" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
      <line x1="231" y1="180" x2="241" y2="180" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
      <line x1="271" y1="180" x2="281" y2="180" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
      <line x1="237" y1="161" x2="245" y2="169" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
      <line x1="267" y1="191" x2="275" y2="199" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
      <line x1="275" y1="161" x2="267" y2="169" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
      <line x1="245" y1="191" x2="237" y2="199" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- AI Circuit Pattern -->
    <g opacity="0.6">
      <circle cx="200" cy="230" r="6" fill="#3B82F6"/>
      <circle cx="240" cy="230" r="6" fill="#8B5CF6"/>
      <circle cx="272" cy="230" r="6" fill="#EC4899"/>
      <circle cx="312" cy="230" r="6" fill="#3B82F6"/>
      
      <line x1="206" y1="230" x2="234" y2="230" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
      <line x1="246" y1="230" x2="266" y2="230" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
      <line x1="278" y1="230" x2="306" y2="230" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
      
      <!-- Dots -->
      <circle cx="220" cy="260" r="4" fill="#3B82F6" opacity="0.7"/>
      <circle cx="256" cy="260" r="4" fill="#8B5CF6" opacity="0.7"/>
      <circle cx="292" cy="260" r="4" fill="#EC4899" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Floating Sparkles Around -->
  <g opacity="0.8">
    <circle cx="100" cy="120" r="6" fill="#FCD34D"/>
    <circle cx="420" cy="140" r="8" fill="#FCA5A5"/>
    <circle cx="90" cy="380" r="7" fill="#A78BFA"/>
    <circle cx="410" cy="360" r="6" fill="#60A5FA"/>
    
    <!-- Small sparkles -->
    <circle cx="130" cy="200" r="3" fill="white" opacity="0.7"/>
    <circle cx="390" cy="250" r="4" fill="white" opacity="0.7"/>
    <circle cx="120" cy="320" r="3" fill="white" opacity="0.7"/>
    <circle cx="400" cy="300" r="3" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Light rays -->
  <g opacity="0.15">
    <path d="M256 100 L280 200 L256 220 L232 200 Z" fill="white"/>
    <path d="M150 256 L220 270 L200 256 L220 242 Z" fill="white"/>
    <path d="M362 256 L292 270 L312 256 L292 242 Z" fill="white"/>
  </g>
</svg>
